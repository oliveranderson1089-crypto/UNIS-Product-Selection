# ============================================================
# UNIS Product Selection — central configuration
# ============================================================
# All runtime defaults live here. Secrets live in .env.
# Change provider/model for a task by editing this file only;
# business code never references provider names directly.
# ============================================================

# ---------- LLM routing ----------
# Each task maps to (provider, model). Swap providers freely
# without touching business code.
llm:
  chat:
    provider: deepseek
    model: deepseek-chat
    temperature: 0.2
    max_tokens: 1024

  reasoning:
    provider: deepseek
    model: deepseek-reasoner
    temperature: 0.0
    max_tokens: 2048

  vision:
    provider: claude
    # `*-latest` aliases auto-track the current stable build; safer than
    # pinning a dated snapshot that Anthropic eventually retires.
    model: claude-haiku-4-5
    temperature: 0.2
    max_tokens: 1024

  # If a provider call fails, optionally fall back to another task.
  # null means no fallback. Used by LLMRouter.
  fallback:
    vision: null            # vision has no text fallback
    reasoning: chat         # if reasoner errors, retry with chat
    chat: null

  # Cap monthly spend per provider (CNY). 0 = no cap.
  budget_cny_monthly:
    deepseek: 0
    claude: 50

# ---------- Storage ----------
storage:
  data_dir: data
  sqlite_path: data/catalog.db
  pdf_dir: data/pdfs
  chroma_dir: data/chroma
  chroma_collection: unis_products

# ---------- Crawler ----------
crawler:
  base_url: https://www.unisyue.com
  # Full catalog scope: both 创新产品 (Autonomous_Controllable, IDs 11-15)
  # and 通用产品 (Commercial_Product, IDs 21-28). The crawler also reads
  # the authoritative ZH/EN name mapping from src/scraper/categories.py;
  # if a category is added on the site, register it there too.
  start_paths:
    # 创新产品 (innovation)
    - /Autonomous_Controllable/11/default.html   # 交换机
    - /Autonomous_Controllable/12/default.html   # 路由器
    - /Autonomous_Controllable/13/default.html   # 安全
    - /Autonomous_Controllable/14/default.html   # 计算存储
    - /Autonomous_Controllable/15/default.html   # 大模型一体机
    # 通用产品 (general)
    - /Commercial_Product/21/default.html        # 交换机
    - /Commercial_Product/22/default.html        # 路由器
    - /Commercial_Product/23/default.html        # 安全
    - /Commercial_Product/24/default.html        # 计算存储
    - /Commercial_Product/25/default.html        # 智能管理
    - /Commercial_Product/26/default.html        # 云计算
    - /Commercial_Product/27/default.html        # 大数据
    - /Commercial_Product/28/default.html        # 无线局域网
  request_timeout: 30
  retries: 3
  # TLS verification. Set false ONLY if you're behind a proxy that does
  # TLS interception (FlClash / corporate firewall) and you trust it.
  # The env var CRAWLER_VERIFY_SSL=false overrides this at runtime.
  verify_ssl: true
  # Optional: restrict to a subset of categories (Chinese names). Empty = all.
  category_whitelist: []
  # Skip products whose name matches any of these substrings.
  skip_keywords: []

# ---------- Selector ----------
selector:
  # Default mode: rule | ai
  default_mode: rule
  # Number of top candidates to return
  top_k: 5
  # When in AI mode, how many products to pass to the LLM as context
  ai_context_top_n: 20

# ---------- Projects ----------
# Project = one sales/pre-sales opportunity. The scanner walks
# work_dir/<assigner>/<project_code>/<files> and upserts a Project row
# per project folder. Override paths per-machine via PROJECTS_WORK_DIR env var.
projects:
  work_dir: "D:/Work/紫光恒越/日常工作"
  # Folder names to skip at the top level (e.g. shared notes, archives)
  skip_top_level: []
  # Filenames to skip everywhere (anywhere in the tree)
  skip_files:
    - "说明.txt"
    - "Thumbs.db"
    - ".DS_Store"
    - "~$*"               # Microsoft Office lock files

# ---------- Scheduler ----------
scheduler:
  enabled: false              # Set true to run periodic updates
  crawl_cron: "0 3 * * 1"     # Weekly Mon 03:00
  timezone: Asia/Shanghai

# ---------- Logging ----------
logging:
  level: INFO                 # DEBUG | INFO | WARNING | ERROR
  file: logs/app.log
